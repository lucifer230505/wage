<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - WagePro</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body data-page="contact">

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">💼 WagePro</div>

        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="calculator.html">Calculator</a>
            <a href="history.html">History</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
       <div class="theme-toggle" id="themeToggle">🌙</div>

        </nav>
         
        <div class="menu-toggle" id="menuToggle">☰</div>
    </header>


    <!-- PAGE HEADER -->
    <section class="page-header">
        <h1>Contact Us</h1>
        <p>We’d love to hear from you</p>
    </section>


    <!-- CONTACT FORM -->
    <section class="contact-container">

        <form class="contact-form" id="contactForm">

            <!-- NAME -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your name">
                <small class="error" id="nameError"></small>
            </div>

            <!-- EMAIL -->
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
                <small class="error" id="emailError"></small>
            </div>

            <!-- SUBJECT -->
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="subject" placeholder="Enter subject">
                <small class="error" id="subjectError"></small>
            </div>

            <!-- MESSAGE -->
            <div class="form-group">
                <label>Message</label>
                <textarea id="message" rows="5" placeholder="Write your message..."></textarea>
                <small class="error" id="messageError"></small>
            </div>

            <!-- SUBMIT BUTTON -->
            <button type="submit" class="btn primary large">
                Send Message
            </button>

            <!-- SUCCESS MESSAGE -->
            <p class="success-message" id="successMessage"></p>

        </form>

    </section>


    <!-- CONTACT INFO -->
    <section class="contact-info">

        <div class="card">
            <h3>📧 Email</h3>
            <p>support@wagepro.com</p>
        </div>

        <div class="card">
            <h3>📞 Phone</h3>
            <p>+234 000 000 0000</p>
        </div>

        <div class="card">
            <h3>📍 Location</h3>
            <p>Lagos, Nigeria</p>
        </div>

    </section>


    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 WagePro. We’re here to help.</p>
    </footer>


    <!-- GLOBAL JS -->
    <script src="app.js"></script>

</body>
</html>
